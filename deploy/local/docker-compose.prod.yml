# Production Docker Compose — Self-Hosted Ubuntu Server
# PostgreSQL + TimescaleDB run natively on the host (not in Docker).
# All DB-connecting services use extra_hosts to reach host via host.docker.internal.
# All ports bound to 127.0.0.1 (Nginx handles public traffic)

services:
  # --- Message Broker ---

  redis:
    image: redis:7-alpine
    container_name: clovercharts-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 300M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: clovercharts-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: clovercharts-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # --- Backend Services ---

  backend:
    image: clovercharts/backend:latest
    container_name: clovercharts-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8001:8001"
    env_file: .env.prod
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - file_storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery-worker:
    image: clovercharts/backend:latest
    container_name: clovercharts-celery-worker
    restart: unless-stopped
    command: celery -A app.orchestration.celery_app worker --loglevel=warning --concurrency=2
    env_file: .env.prod
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - file_storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.orchestration.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery-beat:
    image: clovercharts/backend:latest
    container_name: clovercharts-celery-beat
    restart: unless-stopped
    command: celery -A app.orchestration.celery_app beat --loglevel=warning
    env_file: .env.prod
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q 'celery' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  flower:
    image: clovercharts/backend:latest
    container_name: clovercharts-flower
    restart: unless-stopped
    command: celery -A app.orchestration.celery_app flower --port=5555 --url_prefix=flower --basic-auth=${FLOWER_BASIC_AUTH}
    ports:
      - "127.0.0.1:5555:5555"
    env_file: .env.prod
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - celery-worker
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --- Microservices ---

  signal-generator:
    image: clovercharts/signal-generator:latest
    container_name: clovercharts-signal-generator
    restart: unless-stopped
    env_file: .env.prod
    environment:
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - MARKET_DATA_PROVIDER=${MARKET_DATA_PROVIDER:-data_plane}
      - DATA_PLANE_URL=${DATA_PLANE_URL:-http://data-plane:8000}
      - ENABLE_MARKET_HOURS_CHECK=${ENABLE_MARKET_HOURS_CHECK:-true}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_SIGNAL_TOPIC=${KAFKA_SIGNAL_TOPIC:-trading-signals}
      - BACKEND_DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}
      - LOG_LEVEL=WARNING
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8007:8007"
      - "127.0.0.1:8003:8001"
    volumes:
      - ./config/signal-generator:/app/config
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  trigger-dispatcher:
    image: clovercharts/trigger-dispatcher:latest
    container_name: clovercharts-trigger-dispatcher
    restart: unless-stopped
    env_file: .env.prod
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_SIGNAL_TOPIC=${KAFKA_SIGNAL_TOPIC:-trading-signals}
      - KAFKA_CONSUMER_GROUP=trigger-dispatcher
      - KAFKA_AUTO_OFFSET_RESET=latest
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - LOG_LEVEL=WARNING
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  data-plane:
    image: clovercharts/data-plane:latest
    container_name: clovercharts-data-plane
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    env_file: .env.prod
    environment:
      - SERVICE_NAME=data-plane
      - STOCK_PROVIDER=${STOCK_PROVIDER:-finnhub}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - OANDA_API_KEY=${OANDA_API_KEY}
      - OANDA_ACCOUNT_TYPE=${OANDA_ACCOUNT_TYPE:-practice}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID}
      - REDIS_URL=${DP_REDIS_URL:-redis://redis:6379/1}
      - TIMESCALE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${TIMESCALE_DB}
      - BACKEND_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}
      - CELERY_BROKER_URL=${DP_CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${DP_CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - LOG_LEVEL=WARNING
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8005:8000"
      - "127.0.0.1:8006:8001"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  data-plane-worker:
    image: clovercharts/data-plane:latest
    container_name: clovercharts-data-plane-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_tasks worker --loglevel=WARNING --pool=solo -n data-plane-worker
    env_file: .env.prod
    environment:
      - STOCK_PROVIDER=${STOCK_PROVIDER:-finnhub}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - OANDA_API_KEY=${OANDA_API_KEY}
      - OANDA_ACCOUNT_TYPE=${OANDA_ACCOUNT_TYPE:-practice}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID}
      - REDIS_URL=${DP_REDIS_URL:-redis://redis:6379/1}
      - TIMESCALE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${TIMESCALE_DB}
      - BACKEND_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}
      - CELERY_BROKER_URL=${DP_CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${DP_CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - LOG_LEVEL=WARNING
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 384M

  data-plane-beat:
    image: clovercharts/data-plane:latest
    container_name: clovercharts-data-plane-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_tasks beat --loglevel=WARNING --schedule=/tmp/celerybeat-schedule
    env_file: .env.prod
    environment:
      - STOCK_PROVIDER=${STOCK_PROVIDER:-finnhub}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - OANDA_API_KEY=${OANDA_API_KEY}
      - OANDA_ACCOUNT_TYPE=${OANDA_ACCOUNT_TYPE:-practice}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID}
      - REDIS_URL=${DP_REDIS_URL:-redis://redis:6379/1}
      - TIMESCALE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${TIMESCALE_DB}
      - BACKEND_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}
      - CELERY_BROKER_URL=${DP_CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${DP_CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - LOG_LEVEL=WARNING
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 256M

  # --- Frontend ---

  frontend:
    image: clovercharts/frontend:latest
    container_name: clovercharts-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4200:80"
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/", "-o", "/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Monitoring ---

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: clovercharts-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:19090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:10.2.0
    container_name: clovercharts-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/alerting:/etc/grafana/provisioning/alerting:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  prometheus_data:
  grafana_data:
  file_storage:
