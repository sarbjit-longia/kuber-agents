# Docker Compose for Local Development

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: clovercharts-postgres
    environment:
      POSTGRES_DB: trading_platform
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d trading_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: clovercharts-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # TimescaleDB (Data Plane Database)
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: clovercharts-timescaledb
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: trading_data_plane
    ports:
      - "5434:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d trading_data_plane"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    image: clovercharts/backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clovercharts-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
      - "8001:8001"  # Prometheus metrics endpoint
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dev:devpass@postgres:5432/trading_platform}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_PLANE_URL=http://data-plane:8000
      - SIGNAL_GENERATOR_URL=http://signal-generator:8007
      - BACKTEST_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - BACKTEST_KAFKA_SIGNAL_TOPIC=trading-signals-backtest
      - BACKTEST_RUNTIME_MODE=${BACKTEST_RUNTIME_MODE:-docker_container}
      - BACKTEST_RUNTIME_IMAGE=${BACKTEST_RUNTIME_IMAGE:-clovercharts/backend:latest}
      - BACKTEST_RUNTIME_DOCKER_NETWORK=${BACKTEST_RUNTIME_DOCKER_NETWORK:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.7}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_HTTP_REFERER=${OPENROUTER_HTTP_REFERER:-http://localhost:4200}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-CloverCharts}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED}
      - OTEL_SDK_DISABLED=${OTEL_SDK_DISABLED:-true}
      - CREWAI_TRACING_ENABLED=${CREWAI_TRACING_ENABLED:-false}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - OANDA_API_KEY=${OANDA_API_KEY}
      - OANDA_ACCOUNT_TYPE=${OANDA_ACCOUNT_TYPE:-practice}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID}
      - ALPACA_BASE_URL=${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      - ENV=${ENV:-development}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - ENFORCE_SUBSCRIPTION_LIMITS=${ENFORCE_SUBSCRIPTION_LIMITS:-false}
      - DEFAULT_SUBSCRIPTION_TIER=${DEFAULT_SUBSCRIPTION_TIER:-enterprise}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - LOCAL_STORAGE_PATH=${LOCAL_STORAGE_PATH:-/app/storage/uploads}
    volumes:
      - ./backend:/app
      - ./kb:/app/kb
      - /app/__pycache__
      - file_storage:/app/storage  # Local file storage volume
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    image: clovercharts/backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clovercharts-celery-worker
    command: celery -A app.orchestration.celery_app worker --loglevel=info --concurrency=2 -Q celery -n worker@%h
    ports:
      - "8002:8001"  # Prometheus metrics endpoint (different host port)
    environment:
      - DATABASE_URL=postgresql://dev:devpass@postgres:5432/trading_platform
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATA_PLANE_URL=http://data-plane:8000
      - SIGNAL_GENERATOR_URL=http://signal-generator:8007
      - BACKTEST_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - BACKTEST_KAFKA_SIGNAL_TOPIC=trading-signals-backtest
      - BACKTEST_RUNTIME_MODE=${BACKTEST_RUNTIME_MODE:-docker_container}
      - BACKTEST_RUNTIME_IMAGE=${BACKTEST_RUNTIME_IMAGE:-clovercharts/backend:latest}
      - BACKTEST_RUNTIME_DOCKER_NETWORK=${BACKTEST_RUNTIME_DOCKER_NETWORK:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.7}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_HTTP_REFERER=${OPENROUTER_HTTP_REFERER:-http://localhost:4200}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-CloverCharts}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED}
      - OTEL_SDK_DISABLED=${OTEL_SDK_DISABLED:-true}
      - CREWAI_TRACING_ENABLED=${CREWAI_TRACING_ENABLED:-false}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ENV=development
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
      - ./kb:/app/kb
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.orchestration.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery-beat:
    image: clovercharts/backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clovercharts-celery-beat
    command: celery -A app.orchestration.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://dev:devpass@postgres:5432/trading_platform
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ENV=development
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q 'celery' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Flower (Celery monitoring UI)
  flower:
    image: clovercharts/backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clovercharts-flower
    command: celery -A app.orchestration.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://dev:devpass@postgres:5432/trading_platform
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
      - celery-worker

  # Zookeeper (required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: clovercharts-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Zookeeper"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: clovercharts-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Signal Generator Service
  signal-generator:
    build:
      context: ./signal-generator
      dockerfile: Dockerfile
    container_name: clovercharts-signal-generator
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8003:8001"  # Prometheus metrics endpoint
      - "8007:8007"  # Recent signals monitoring API
    environment:
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - TIINGO_API_KEY=${TIINGO_API_KEY}
      - MARKET_DATA_PROVIDER=data_plane
      - DATA_PLANE_URL=http://data-plane:8000
      - ADDITIONAL_TIMEFRAMES=5,15,60
      - LOG_LEVEL=INFO
      # Market Hours Configuration (auto-detects stocks/forex/crypto from tickers)
      - ENABLE_MARKET_HOURS_CHECK=${ENABLE_MARKET_HOURS_CHECK:-true}
      - MARKET_HOURS_CHECK_INTERVAL_SECONDS=${MARKET_HOURS_CHECK_INTERVAL_SECONDS:-60}
      - GOLDEN_CROSS_CHECK_INTERVAL_SECONDS=300
      - GOLDEN_CROSS_SMA_SHORT=50
      - GOLDEN_CROSS_SMA_LONG=200
      - GOLDEN_CROSS_TIMEFRAME=D
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_SIGNAL_TOPIC=trading-signals
      - BACKEND_DB_URL=postgresql://dev:devpass@postgres:5432/trading_platform
      - UNIVERSE_REFRESH_INTERVAL_SECONDS=300
    volumes:
      # Mount config directory so users can edit watchlist without rebuilding
      - ./signal-generator/config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8007/recent-signals')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Trigger Dispatcher Service
  trigger-dispatcher:
    build:
      context: ./trigger-dispatcher
      dockerfile: Dockerfile
    container_name: clovercharts-trigger-dispatcher
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8004:8001"  # Prometheus metrics endpoint
    environment:
      - LOG_LEVEL=INFO
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_SIGNAL_TOPIC=trading-signals
      - KAFKA_CONSUMER_GROUP=trigger-dispatcher
      - KAFKA_AUTO_OFFSET_RESET=latest
      - BATCH_SIZE=20
      - BATCH_TIMEOUT_SECONDS=0.5
      - CACHE_REFRESH_INTERVAL_SECONDS=30
      - POSTGRES_USER=${POSTGRES_USER:-dev}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devpass}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-trading_platform}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q 'python' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Data Plane API
  data-plane:
    build:
      context: ./data-plane
      dockerfile: Dockerfile
    container_name: clovercharts-data-plane
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - SERVICE_NAME=data-plane
      - LOG_LEVEL=INFO
      - STOCK_PROVIDER=${STOCK_PROVIDER:-finnhub}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - TIINGO_API_KEY=${TIINGO_API_KEY}
      - OANDA_API_KEY=${OANDA_API_KEY}
      - OANDA_ACCOUNT_TYPE=${OANDA_ACCOUNT_TYPE:-practice}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID}
      - REDIS_URL=redis://redis:6379/1
      - TIMESCALE_URL=postgresql+asyncpg://dev:devpass@timescaledb:5432/trading_data_plane
      - BACKEND_DB_URL=postgresql+asyncpg://dev:devpass@postgres:5432/trading_platform
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - METRICS_PORT=8001
    ports:
      - "8005:8000"  # Data Plane API
      - "8006:8001"  # Prometheus metrics
    depends_on:
      timescaledb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data-plane:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Data Plane Celery Worker
  data-plane-worker:
    build:
      context: ./data-plane
      dockerfile: Dockerfile
    container_name: clovercharts-data-plane-worker
    command: celery -A app.tasks.celery_tasks worker --loglevel=INFO --pool=solo -n data-plane-worker
    environment:
      - STOCK_PROVIDER=${STOCK_PROVIDER:-finnhub}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - TIINGO_API_KEY=${TIINGO_API_KEY}
      - OANDA_API_KEY=${OANDA_API_KEY}
      - OANDA_ACCOUNT_TYPE=${OANDA_ACCOUNT_TYPE:-practice}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID}
      - REDIS_URL=redis://redis:6379/1
      - TIMESCALE_URL=postgresql+asyncpg://dev:devpass@timescaledb:5432/trading_data_plane
      - BACKEND_DB_URL=postgresql+asyncpg://dev:devpass@postgres:5432/trading_platform
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - LOG_LEVEL=INFO
    depends_on:
      - redis
      - timescaledb
      - postgres
    volumes:
      - ./data-plane:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_tasks inspect ping -d celery@data-plane-worker || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Data Plane Celery Beat (Scheduler)
  data-plane-beat:
    build:
      context: ./data-plane
      dockerfile: Dockerfile
    container_name: clovercharts-data-plane-beat
    command: celery -A app.tasks.celery_tasks beat --loglevel=INFO --schedule=/tmp/celerybeat-schedule
    environment:
      - STOCK_PROVIDER=${STOCK_PROVIDER:-finnhub}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - TIINGO_API_KEY=${TIINGO_API_KEY}
      - OANDA_API_KEY=${OANDA_API_KEY}
      - OANDA_ACCOUNT_TYPE=${OANDA_ACCOUNT_TYPE:-practice}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID}
      - REDIS_URL=redis://redis:6379/1
      - TIMESCALE_URL=postgresql+asyncpg://dev:devpass@timescaledb:5432/trading_data_plane
      - BACKEND_DB_URL=postgresql+asyncpg://dev:devpass@postgres:5432/trading_platform
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SERVICE_NAME=data-plane-beat
      - LOG_LEVEL=INFO
      - METRICS_PORT=8001
    depends_on:
      - redis
      - timescaledb
      - postgres
    volumes:
      - ./data-plane:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q 'celery' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Langfuse (optional self-hosted tracing stack)
  langfuse-postgres:
    image: postgres:16-alpine
    container_name: clovercharts-langfuse-postgres
    profiles: ['langfuse']
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
      TZ: UTC
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clovercharts-langfuse-clickhouse
    profiles: ['langfuse']
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse}
      TZ: UTC
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse} --query 'SELECT 1'"]
      interval: 15s
      timeout: 10s
      retries: 8
    restart: unless-stopped

  langfuse-minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: clovercharts-langfuse-minio
    profiles: ['langfuse']
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_S3_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_S3_SECRET_ACCESS_KEY:-miniosecret}
      TZ: UTC
    ports:
      - "127.0.0.1:9091:9001"
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  langfuse-minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: clovercharts-langfuse-minio-init
    profiles: ['langfuse']
    depends_on:
      langfuse-minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://langfuse-minio:9000 ${LANGFUSE_S3_ACCESS_KEY_ID:-minio} ${LANGFUSE_S3_SECRET_ACCESS_KEY:-miniosecret} &&
        mc mb -p local/${LANGFUSE_S3_EVENT_UPLOAD_BUCKET:-langfuse} || true &&
        exit 0
    restart: "no"

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: clovercharts-langfuse-web
    profiles: ['langfuse']
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      langfuse-minio-init:
        condition: service_completed_successfully
    ports:
      - "3300:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-postgres:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: ""
      NEXTAUTH_URL: ${LANGFUSE_SELF_HOST_URL:-http://localhost:3300}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me-langfuse-nextauth-secret}
      SALT: ${LANGFUSE_SALT:-change-me-langfuse-salt}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_EVENT_UPLOAD_BUCKET:-langfuse}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: ${LANGFUSE_S3_EVENT_UPLOAD_REGION:-auto}
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_ACCESS_KEY_ID:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_SECRET_ACCESS_KEY:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: ${LANGFUSE_S3_EVENT_UPLOAD_PREFIX:-events/}
      LANGFUSE_DISABLE_SIGNUP: ${LANGFUSE_DISABLE_SIGNUP:-false}
      TELEMETRY_ENABLED: "false"
      TZ: UTC
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 40s
    restart: unless-stopped

  langfuse-worker:
    image: ghcr.io/langfuse/langfuse-worker:3
    container_name: clovercharts-langfuse-worker
    profiles: ['langfuse']
    depends_on:
      langfuse-web:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-postgres:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: ""
      NEXTAUTH_URL: ${LANGFUSE_SELF_HOST_URL:-http://localhost:3300}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me-langfuse-nextauth-secret}
      SALT: ${LANGFUSE_SALT:-change-me-langfuse-salt}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_EVENT_UPLOAD_BUCKET:-langfuse}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: ${LANGFUSE_S3_EVENT_UPLOAD_REGION:-auto}
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_ACCESS_KEY_ID:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_SECRET_ACCESS_KEY:-miniosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: ${LANGFUSE_S3_EVENT_UPLOAD_PREFIX:-events/}
      TELEMETRY_ENABLED: "false"
      TZ: UTC
    restart: unless-stopped

  # Prometheus - Metrics Storage & Aggregation
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: clovercharts-prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - default

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:10.2.0
    container_name: clovercharts-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/alerting:/etc/grafana/provisioning/alerting-available:ro
      - ./monitoring/grafana/grafana-entrypoint.sh:/grafana-entrypoint.sh:ro
      - grafana_data:/var/lib/grafana
    entrypoint: ["/bin/sh", "/grafana-entrypoint.sh"]
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - default

volumes:
  postgres_data:
  timescaledb_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_minio_data:
  prometheus_data:
  grafana_data:
  file_storage:  # Local file storage for uploads (dev)
