server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Preserve the upstream's X-Forwarded-Proto if set (system nginx → frontend over HTTP
    # would otherwise overwrite https → http, breaking redirects from FastAPI which
    # constructs absolute URLs from this header). Fall back to local $scheme for direct
    # LAN/dev access on port 4200. Fixed 2026-04-28: was causing https → http 307
    # redirects on /api/v1/executions which browsers blocked as mixed-content.
    set $forward_proto $scheme;
    if ($http_x_forwarded_proto != "") {
        set $forward_proto $http_x_forwarded_proto;
    }

    # Proxy API requests to the backend service when the frontend container
    # is accessed directly (for example on :4200 in local/prod Docker setups).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forward_proto;
        proxy_read_timeout 120s;
    }

    location /api/v1/ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forward_proto;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location = /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback — serve index.html for Angular routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively
    location ~* "\.[0-9a-f]{16,}\.(js|css)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache other static assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
}
