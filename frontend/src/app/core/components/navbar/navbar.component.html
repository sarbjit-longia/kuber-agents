<mat-toolbar class="navbar">
  <div class="navbar-content">
    <!-- Logo/Brand -->
    <div class="navbar-brand">
      <a routerLink="/" class="brand-link">
        <svg class="brand-logo" viewBox="0 0 60 68" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="nav-clover" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#06b6d4"/>
            </linearGradient>
          </defs>
          <circle cx="22" cy="19" r="12" fill="none" stroke="url(#nav-clover)" stroke-width="2.4"/>
          <circle cx="38" cy="19" r="12" fill="none" stroke="url(#nav-clover)" stroke-width="2.4"/>
          <circle cx="22" cy="35" r="12" fill="none" stroke="url(#nav-clover)" stroke-width="2.4"/>
          <circle cx="38" cy="35" r="12" fill="none" stroke="url(#nav-clover)" stroke-width="2.4"/>
          <line x1="30" y1="42" x2="30" y2="64" stroke="url(#nav-clover)" stroke-width="2.4" stroke-linecap="round"/>
        </svg>
        <span class="brand-name">CloverCharts</span>
      </a>
    </div>

    <!-- Navigation Links -->
    <div class="navbar-links">
      <ng-container *ngIf="!isAuthenticated">
        <a routerLink="/" class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          Home
        </a>
        <a routerLink="/how-it-works" class="nav-link" routerLinkActive="active">
          How It Works
        </a>
      </ng-container>

      <ng-container *ngIf="isAuthenticated">
        <a routerLink="/dashboard" class="nav-link" routerLinkActive="active">
          Dashboard
        </a>
        <a routerLink="/pipelines" class="nav-link" routerLinkActive="active">
          Pipelines
        </a>
        <a routerLink="/scanners" class="nav-link" routerLinkActive="active">
          Scanners
        </a>
        <a routerLink="/monitoring" class="nav-link" routerLinkActive="active">
          Monitoring
        </a>
      </ng-container>
    </div>

    <!-- Auth Buttons -->
    <div class="navbar-actions">
      <button mat-icon-button [matMenuTriggerFor]="mobileMenu" class="mobile-menu-button" aria-label="Open navigation">
        <mat-icon>menu</mat-icon>
      </button>

      <ng-container *ngIf="!isAuthenticated">
        <button mat-button routerLink="/login" class="login-button">
          <mat-icon>login</mat-icon>
          Login
        </button>
        <button mat-raised-button color="primary" routerLink="/register" class="register-button">
          <mat-icon>person_add</mat-icon>
          Sign Up
        </button>
      </ng-container>

      <ng-container *ngIf="isAuthenticated">
        <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-menu-button">
          <mat-icon>account_circle</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item routerLink="/settings" [queryParams]="{section: 'profile'}">
            <mat-icon>person</mat-icon>
            <span>Profile</span>
          </button>
          <button mat-menu-item routerLink="/settings" [queryParams]="{section: 'notifications'}">
            <mat-icon>settings</mat-icon>
            <span>Settings</span>
          </button>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </ng-container>
    </div>
  </div>
</mat-toolbar>

<mat-menu #mobileMenu="matMenu" class="mobile-nav-menu">
  <ng-container *ngIf="!isAuthenticated">
    <button mat-menu-item routerLink="/">
      <mat-icon>home</mat-icon>
      <span>Home</span>
    </button>
    <button mat-menu-item routerLink="/how-it-works">
      <mat-icon>info</mat-icon>
      <span>How It Works</span>
    </button>
  </ng-container>

  <ng-container *ngIf="isAuthenticated">
    <button mat-menu-item routerLink="/dashboard">
      <mat-icon>dashboard</mat-icon>
      <span>Dashboard</span>
    </button>
    <button mat-menu-item routerLink="/pipelines">
      <mat-icon>account_tree</mat-icon>
      <span>Pipelines</span>
    </button>
    <button mat-menu-item routerLink="/scanners">
      <mat-icon>manage_search</mat-icon>
      <span>Scanners</span>
    </button>
    <button mat-menu-item routerLink="/monitoring">
      <mat-icon>monitoring</mat-icon>
      <span>Monitoring</span>
    </button>
  </ng-container>
</mat-menu>
