<div class="clone-dialog">
  <div mat-dialog-title>Clone Pipeline</div>

  <div mat-dialog-content class="clone-dialog__content">
    <p class="clone-dialog__copy">
      Create a duplicate of <strong>{{ data.pipelineName }}</strong> with a new name.
    </p>

    <mat-form-field appearance="outline" class="clone-dialog__field">
      <mat-label>Pipeline name</mat-label>
      <input
        matInput
        [formControl]="nameControl"
        maxlength="255"
        cdkFocusInitial
        (keydown.enter)="submit()">
      <mat-hint align="end">{{ (nameControl.value || '').length }}/255</mat-hint>
      <mat-error *ngIf="nameControl.hasError('required')">Name is required</mat-error>
      <mat-error *ngIf="nameControl.hasError('maxlength')">Name is too long</mat-error>
    </mat-form-field>
  </div>

  <div mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" type="button" [disabled]="!canSubmit" (click)="submit()">
      Clone Pipeline
    </button>
  </div>
</div>
