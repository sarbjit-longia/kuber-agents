apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram-default
        type: telegram
        settings:
          bottoken: ${TELEGRAM_BOT_TOKEN}
          chatid: ${TELEGRAM_CHAT_ID}
          parse_mode: HTML
          message: |
            <b>{{ .Status | toUpper }}</b>
            <b>Alert:</b> {{ .CommonLabels.alertname }}
            <b>Severity:</b> {{ .CommonLabels.severity }}
            {{ range .Alerts }}
            {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ end }}
